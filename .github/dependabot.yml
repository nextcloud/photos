version: 2
updates:
- package-ecosystem: "github-actions"
  directory: "/"
  schedule:
    interval: weekly
    day: sunday
    time: "06:00"
    timezone: Europe/Paris
  cooldown:
    default-days: 10

- package-ecosystem: composer
  versioning-strategy: increase
  directories:
    - "/"
    - "/vendor-bin/*"
  schedule:
    interval: weekly
    day: saturday
    time: "03:00"
    timezone: Europe/Paris
  cooldown:
    default-days: 10
  labels:
    - "3. to review"
    - "dependencies"

- package-ecosystem: npm
  versioning-strategy: increase
  directory: "/"
  schedule:
    interval: weekly
    day: saturday
    time: "03:00"
    timezone: Europe/Paris
  cooldown:
    default-days: 10
  labels:
    - "3. to review"
    - "dependencies"

# Main stableXX npm
- package-ecosystem: npm
  target-branch: stable34
  directory: "/"
  schedule:
    interval: weekly
    day: saturday
    time: "03:00"
    timezone: Europe/Paris
  cooldown:
    default-days: 10
  labels:
    - "3. to review"
    - "dependencies"
  ignore:
    # do not do breaking changes on stable branches
    - dependency-name: "*"
      update-types: ["version-update:semver-major", "version-update:semver-minor"]

- package-ecosystem: npm
  target-branch: stable33
  directory: "/"
  schedule:
    interval: weekly
    day: saturday
    time: "03:00"
    timezone: Europe/Paris
  cooldown:
    default-days: 10
  labels:
    - "3. to review"
    - "dependencies"
  ignore:
    # do not do breaking changes on stable branches
    - dependency-name: "*"
      update-types: ["version-update:semver-major"]

- package-ecosystem: npm
  target-branch: stable32
  directory: "/"
  schedule:
    interval: weekly
    day: saturday
    time: "03:00"
    timezone: Europe/Paris
  cooldown:
    default-days: 10
  labels:
    - "3. to review"
    - "dependencies"
  ignore:
    # do not do breaking changes on stable branches
    - dependency-name: "*"
      update-types: ["version-update:semver-major"]


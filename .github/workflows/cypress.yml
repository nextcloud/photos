name: Cypress

on: pull_request

concurrency:
  group: cypress-${{ github.head_ref || github.run_id }}
  cancel-in-progress: true

env:
  # Adjust APP_NAME if your repository name is different
  APP_NAME: ${{ github.event.repository.name }}

  # This represents the server branch to checkout.
  # Usually it's the base branch of the PR, but for pushes it's the branch itself.
  # e.g. 'main', 'stable27' or 'feature/my-feature'
  # n.b. server will use head_ref, as we want to test the PR branch.
  BRANCH: ${{ github.base_ref || github.ref_name }}


  # The recognize branch to build for the faces tests. recognize master supports
  # the current server releases; override for stable branches if needed.
  RECOGNIZE_BRANCH: main

permissions:
  contents: read

jobs:
  init:
    runs-on: ubuntu-latest
    outputs:
      nodeVersion: ${{ steps.versions.outputs.nodeVersion }}
      npmVersion: ${{ steps.versions.outputs.npmVersion }}

    env:
      PUPPETEER_SKIP_DOWNLOAD: true

    steps:
      - name: Disabled on forks
        if: ${{ github.event.pull_request.head.repo.full_name != github.repository }}
        run: |
          echo 'Can not run cypress on forks'
          exit 1

      - name: Checkout app
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          persist-credentials: false

      - name: Check composer.json
        id: check_composer
        uses: andstor/file-existence-action@558493d6c74bf472d87c84eab196434afc2fa029 # v3.1.0
        with:
          files: 'composer.json'

      - name: Install composer dependencies
        if: steps.check_composer.outputs.files_exists == 'true'
        run: composer install --no-dev

      - name: Read package.json node and npm engines version
        uses: skjnldsv/read-package-engines-version-actions@06d6baf7d8f41934ab630e97d9e6c0bc9c9ac5e4 # v3
        id: versions
        with:
          fallbackNode: '^24'
          fallbackNpm: '^11.3'

      - name: Set up node ${{ steps.versions.outputs.nodeVersion }}
        uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          node-version: ${{ steps.versions.outputs.nodeVersion }}

      - name: Set up npm ${{ steps.versions.outputs.npmVersion }}
        run: npm i -g 'npm@${{ steps.versions.outputs.npmVersion }}'

      - name: Install node dependencies & build app
        run: |
          npm ci
          TESTING=true npm run build --if-present

      # The faces tests drive the recognize WebDAV API, so we build a recognize
      # checkout here (models are tracked in the repo, the TensorFlow binaries are
      # fetched by `make all`) and ship it inside the cached context. It is later
      # mounted into the test container via RECOGNIZE_APP_PATH (see cypress.config.ts).
      - name: Set up PHP for recognize
        uses: shivammathur/setup-php@f3e473d116dcccaddc5834248c87452386958240 # v2.37.2
        with:
          php-version: "8.3"
          extensions: mbstring, iconv, fileinfo, intl, sqlite, pdo_sqlite, gd, zip, bz2
          tools: composer

      # recognize spawns a bundled Node runtime and loads the TensorFlow native
      # addon built during `npm ci`; build it under the Node version recognize
      # runs at runtime (NODE_VERSION below) so the addon ABI matches.
      - name: Set up node 20 for recognize
        uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          node-version: "20"

      - name: Checkout recognize
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          repository: nextcloud/recognize
          ref: ${{ env.RECOGNIZE_BRANCH }}
          path: recognize-app
          persist-credentials: false

      - name: Build recognize
        working-directory: recognize-app
        env:
          # Keep in sync with recognize's InstallDeps::NODE_VERSION.
          NODE_VERSION: v20.9.0
        run: |
          composer install --no-dev
          make all
          # recognize's InstallDeps migration normally downloads this Node binary
          # on app:enable, but it cannot here: the app is mounted read-only in the
          # test container. Pre-stage it so the classifier process can start.
          curl -fsSL "https://nodejs.org/dist/${NODE_VERSION}/node-${NODE_VERSION}-linux-x64.tar.gz" -o /tmp/node.tar.gz
          tar -xzf /tmp/node.tar.gz -C /tmp
          mkdir -p bin
          cp "/tmp/node-${NODE_VERSION}-linux-x64/bin/node" bin/node
          chmod +x bin/node
          # Drop git metadata to keep the cached context small; the working tree
          # (models + TensorFlow binaries) is all that is needed at runtime.
          rm -rf .git

      - name: Save context
        uses: actions/cache/save@55cc8345863c7cc4c66a329aec7e433d2d1c52a9 # v6.1.0
        with:
          key: cypress-context-${{ github.run_id }}
          path: ./

  cypress:
    runs-on: ubuntu-latest
    needs: init

    strategy:
      fail-fast: false
      matrix:
        # Run multiple copies of the current job in parallel
        # Please increase the number or runners as your tests suite grows
        containers: ["1", "2", "3"]

    name: runner ${{ matrix.containers }}

    steps:
      - name: Restore context
        uses: actions/cache/restore@55cc8345863c7cc4c66a329aec7e433d2d1c52a9 # v6.1.0
        with:
          fail-on-cache-miss: true
          key: cypress-context-${{ github.run_id }}
          path: ./

      - name: Set up node ${{ needs.init.outputs.nodeVersion }}
        uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          node-version: ${{ needs.init.outputs.nodeVersion }}

      - name: Set up npm ${{ needs.init.outputs.npmVersion }}
        run: npm i -g 'npm@${{ needs.init.outputs.npmVersion }}'

      - name: Run ${{ matrix.containers == 'component' && 'component' || 'E2E' }} cypress tests
        uses: cypress-io/github-action@948d67d3074f1bbb6379c8bdbb04e95d2f8e593f # v7.4.0
        with:
          record: ${{ secrets.CYPRESS_RECORD_KEY && true }}
          parallel: ${{ secrets.CYPRESS_RECORD_KEY && true }}
          # cypress run type
          component: ${{ matrix.containers == 'component' }}
          group: ${{ secrets.CYPRESS_RECORD_KEY && env.CYPRESS_GROUP }}
          # cypress env
          ci-build-id: ${{ secrets.CYPRESS_RECORD_KEY && env.CYPRESS_BUILD_ID }}
          tag: ${{ secrets.CYPRESS_RECORD_KEY && github.event_name }}
        env:
          # Needs to be prefixed with CYPRESS_
          CYPRESS_BRANCH: ${{ env.BRANCH }}
          # https://github.com/cypress-io/github-action/issues/124
          COMMIT_INFO_MESSAGE: ${{ github.event.pull_request.title }}
          # Needed for some specific code workarounds
          TESTING: true
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          CYPRESS_RECORD_KEY: ${{ secrets.CYPRESS_RECORD_KEY }}
          CYPRESS_BUILD_ID: ${{ github.sha }}-${{ github.run_number }}
          CYPRESS_GROUP: Run ${{ matrix.containers == 'component' && 'component' || 'E2E' }}
          # Built recognize app, mounted into the test container for the faces tests
          RECOGNIZE_APP_PATH: ${{ github.workspace }}/recognize-app

      - name: Upload snapshots
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        if: always()
        with:
          name: snapshots_${{ matrix.containers }}
          path: cypress/snapshots

      - name: Extract NC logs
        if: failure() && matrix.containers != 'component'
        run: docker logs nextcloud-cypress-tests-${{ env.APP_NAME }} > nextcloud.log

      - name: Upload NC logs
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        if: failure() && matrix.containers != 'component'
        with:
          name: nc_logs_${{ matrix.containers }}
          path: nextcloud.log

      # The template's "Extract NC logs" step uses the wrong container name
      # (@nextcloud/e2e-test-server names it nextcloud-e2e-test-server_<app>) and
      # recognize's classifier errors may go to either data/nextcloud.log or the
      # container's stderr depending on log_type. Discover the container by
      # listing all of them and grab both logs for the faces tests.
      - name: Extract Nextcloud app log
        if: failure() && matrix.containers != 'component'
        run: |
          container=$(docker ps -a --format '{{.Names}}' | grep -iE 'nextcloud|cypress' | head -n1)
          echo "Using container: $container"
          mkdir -p nc-logs
          docker exec "$container" sh -c 'cat /var/www/html/data/nextcloud.log' > nc-logs/nextcloud.log 2>&1 || true
          docker logs "$container" > nc-logs/docker.log 2>&1 || true

      - name: Upload Nextcloud app log
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        if: failure() && matrix.containers != 'component'
        with:
          name: nc_app_log_${{ matrix.containers }}
          path: nc-logs/

  summary:
    runs-on: ubuntu-latest-low
    needs: [init, cypress]

    if: always()

    name: cypress-summary

    steps:
      - name: Summary status
        run: if ${{ needs.init.result != 'success' || ( needs.cypress.result != 'success' && needs.cypress.result != 'skipped' ) }}; then exit 1; fi
